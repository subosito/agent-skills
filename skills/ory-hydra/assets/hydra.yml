# Ory Hydra Configuration
# For production, review https://www.ory.sh/docs/hydra/reference/configuration

serve:
  # Public/OAuth2 API (used by clients)
  public:
    port: 4444
    host: 0.0.0.0
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
        - http://localhost:4200
        - https://app.example.com
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Content-Type
      allow_credentials: true
      max_age: 10
      options_passthrough: false
      debug: false

  # Admin API (protected, used by your login/consent app)
  admin:
    port: 4445
    host: 0.0.0.0
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type

ttl:
  # Token lifespans
  access_token: 1h
  refresh_token: 720h  # 30 days
  id_token: 1h
  auth_code: 10m
  login_consent_request: 1h
  device_code: 10m
  user_code: 10m

urls:
  # Public issuer URL (must be accessible by clients)
  self:
    issuer: http://127.0.0.1:4444
  
  # Your login/consent/logout endpoints
  login: http://127.0.0.1:3000/login
  consent: http://127.0.0.1:3000/consent
  logout: http://127.0.0.1:3000/logout
  
  # Post-logout redirect (optional, can be configured per-client)
  post_logout_redirect: http://127.0.0.1:3000/

# System secrets (32+ characters, must not be lost!)
# Generate with: openssl rand -base64 32
secrets:
  system:
    - CHANGE-ME-IN-PRODUCTION-32-CHARS!!!
    - rotation-secret-can-be-added-here

# OIDC Configuration
oidc:
  # Subject identifier types
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      # Salt for pairwise hashing (16+ characters)
      # Generate with: openssl rand -base64 16
      salt: CHANGE-ME-16-CHARS
  
  # Dynamic client registration (OIDC)
  dynamic_client_registration:
    enabled: false
    # default_scope:
    #   - openid
    #   - offline_access

# OAuth2 strategies
strategies:
  # Access token type: "opaque" or "jwt"
  access_token: opaque
  # scope: "wildcard" or "exact"
  # wildcard allows "read:users" to match "read:users:123"

# Grant types enabled
# Default: authorization_code, implicit, password, client_credentials, refresh_token
generate:
  # key: "ed25519", "ed25519-x25519", "rs256", "es256", "es256-k", "es384", "es512"
  # Used for signing ID tokens and JWT access tokens
  # ed25519 is recommended for new deployments

# PKCE (Proof Key for Code Exchange)
# Enforced for public clients, recommended for all
pkce:
  # enabled: true
  # enforced_for_public_clients: true

# OAuth2 client registration
# clients:
#   - client_id: example-client
#     client_name: Example Client
#     grant_types:
#       - authorization_code
#       - refresh_token
#     redirect_uris:
#       - http://localhost:3000/callback

# Webhooks (optional)
# webhooks:
#   - hook: token_issued
#     config:
#       url: http://my-api/webhook
#       method: POST
#       body: file:///etc/config/hydra/webhook.jsonnet

# Tracing (optional)
# tracing:
#   provider: jaeger
#   service_name: Ory Hydra
#   jaeger:
#     local_agent_address: 127.0.0.1:6831

# Metrics (Prometheus)
# metrics:
#   prometheus:
#     enabled: true
#     port: 4446

# Log configuration
log:
  level: info  # debug, info, warn, error, fatal, panic
  format: text  # text, json
  leak_sensitive_values: false  # Set true only for debugging

# Database configuration (DSN can also be set via env var)
# dsn: postgres://user:pass@localhost:5432/hydra?sslmode=disable
# dsn: mysql://user:pass@tcp(localhost:3306)/hydra?parseTime=true
# dsn: cockroach://user:pass@localhost:26257/hydra?sslmode=disable

# SQLite (development only)
# dsn: sqlite:///var/lib/sqlite/db.sqlite?_fk=true

# Feature flags (advanced)
# feature_flags:
#   - some-feature-flag

# Cookie configuration
