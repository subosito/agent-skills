# Quickstart Docker Compose for Ory Hydra
# For production deployment, use proper secrets and persistent volumes

version: "3.8"

services:
  # Hydra database (PostgreSQL)
  hydra-postgres:
    image: postgres:15-alpine
    container_name: hydra-postgres
    environment:
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=hydra
    volumes:
      - hydra-postgres-data:/var/lib/postgresql/data
    networks:
      - hydra-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Hydra migration
  hydra-migrate:
    image: oryd/hydra:v2.2.0
    container_name: hydra-migrate
    environment:
      - DSN=postgres://hydra:secret@hydra-postgres:5432/hydra?sslmode=disable
    command: migrate sql --yes
    restart: on-failure
    networks:
      - hydra-net
    depends_on:
      hydra-postgres:
        condition: service_healthy

  # Hydra server
  hydra:
    image: oryd/hydra:v2.2.0
    container_name: hydra
    ports:
      - "4444:4444"  # Public/OAuth2 API
      - "4445:4445"  # Admin API
    environment:
      - DSN=postgres://hydra:secret@hydra-postgres:5432/hydra?sslmode=disable
      - SECRETS_SYSTEM=CHANGE-ME-IN-PRODUCTION-32-CHARS!!
      - URLS_SELF_ISSUER=http://127.0.0.1:4444
      - URLS_LOGIN=http://127.0.0.1:3000/login
      - URLS_CONSENT=http://127.0.0.1:3000/consent
      - URLS_LOGOUT=http://127.0.0.1:3000/logout
      - SERVE_PUBLIC_CORS_ENABLED=true
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - LOG_LEVEL=info
    command: serve all --dev
    restart: unless-stopped
    networks:
      - hydra-net
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully

  # Example login/consent app (optional)
  hydra-login-consent:
    image: oryd/hydra-login-consent-node:v1.13.0
    container_name: hydra-login-consent
    ports:
      - "3000:3000"
    environment:
      - HYDRA_ADMIN_URL=http://hydra:4445
      - PORT=3000
    networks:
      - hydra-net
    depends_on:
      - hydra

volumes:
  hydra-postgres-data:

networks:
  hydra-net:
    driver: bridge
